<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mysty is a skid!</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #050505;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    h1 {
        font-size: 4rem;
        font-weight: bold;
        text-align: center;

        background: linear-gradient(
            90deg,
            red,
            orange,
            yellow,
            lime,
            cyan,
            blue,
            violet,
            red
        );
        background-size: 400% 100%;

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        animation:
            rainbow 4s linear infinite,
            float 2s ease-in-out infinite;
    }

    @keyframes rainbow {
        0% { background-position: 0% 50%; }
        100% { background-position: 400% 50%; }
    }

    @keyframes float {
        0%, 100% {
            transform: translateY(0px);
        }
        50% {
            transform: translateY(-20px);
        }
    }
</style>
</head>
<body>

<audio id="bgm" loop>
    <source src="mysty-a-skid.mp3" type="audio/mpeg">
</audio>

<h1>yo bro</h1>

<script>
const titleText = "Mysty is a skid!";
let index = 0;
let deleting = false;

function animateTitle() {
    if (!deleting) {
        document.title = titleText.substring(0, index++);
        if (index > titleText.length) {
            deleting = true;
            setTimeout(animateTitle, 1000);
            return;
        }
    } else {
        document.title = titleText.substring(0, index--);
        if (index < 0) {
            deleting = false;
            index = 0;
        }
    }

    setTimeout(animateTitle, deleting ? 80 : 120);
}

animateTitle();

// AUDIO (fixed + more reliable browser unlock)
const audio = document.getElementById("bgm");
audio.volume = 0.5;
audio.loop = true;

function startAudio() {
    audio.play().catch(() => {});
}

// try autoplay first
window.addEventListener("load", () => {
    startAudio();
});

// fallback unlock (guaranteed user gesture)
document.addEventListener("click", startAudio, { once: true });
document.addEventListener("keydown", startAudio, { once: true });
</script>

</body>
</html>
